<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#22d3ee">
    <title id="page-title"> Expense Tracker By Abdur Rahim| খরচ ট্র্যাকার বাই আব্দুর রাহিম</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+Bengali:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        :root { --neon-cyan: #22d3ee; }
        .dark { --neon-cyan: #67e8f9; }
        
        * { transition: all 0.3s ease; }
        
        .glass {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .dark .glass { background: rgba(15,23,42,0.75); border-color: rgba(255,255,255,0.1); }
        .light .glass { background: rgba(255,255,255,0.85); border-color: rgba(0,0,0,0.1); color: #1e2937; }
        
        .neon-text { text-shadow: 0 0 15px var(--neon-cyan); }
        .currency { font-family: monospace; }

        /* Mobile First Improvements */
        @media (max-width: 640px) {
            .container { padding-left: 1rem; padding-right: 1rem; }
            .summary-grid { grid-template-columns: 1fr 1fr; gap: 1rem; }
        }

        /* Modal Animation */
        .modal {
            animation: modalSlideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        
        @keyframes modalSlideUp {
            from {
                opacity: 0;
                transform: translateY(80px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-950 to-indigo-950 dark:from-slate-950 dark:to-indigo-950 light:from-slate-100 light:to-indigo-100 min-h-screen text-slate-900 dark:text-white light:text-slate-900">

    <!-- Navbar -->
    <nav class="glass sticky top-0 z-50 border-b border-white/10">
        <div class="max-w-7xl mx-auto px-5 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2 sm:gap-3">
                <button onclick="openProfileModal()" class="w-9 h-9 rounded-full glass flex items-center justify-center text-lg hover:bg-white/10 hover:scale-105 active:scale-95 transition-all">👤</button>
                
                <div class="w-9 h-9 rounded-2xl bg-gradient-to-br from-cyan-400 to-purple-500 flex items-center justify-center text-2xl">🕊️</div>
                <h1 class="text-xl sm:text-3xl font-semibold tracking-tight neon-text"> Expense Tracker</h1>
            </div>
            <div class="flex items-center gap-2 sm:gap-3">
                <button onclick="exportToPDF()" id="pdf-btn" class="glass px-3 py-2 rounded-3xl text-xs sm:text-sm font-medium hover:bg-white/10">📄 PDF</button>
                <button onclick="toggleLanguage()" id="lang-btn" class="glass px-3 py-2 rounded-3xl text-xs sm:text-sm font-medium hover:bg-white/10">EN</button>
                <button onclick="toggleTheme()" id="theme-btn" class="glass w-9 h-9 rounded-3xl flex items-center justify-center text-lg hover:bg-white/10">🌙</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-5 py-6 container">
        <!-- Dynamic Greeting -->
        <h2 id="greeting" class="text-4xl sm:text-5xl font-semibold mb-8"></h2>

        <!-- Summary -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-10 summary-grid">
            <div class="glass rounded-3xl p-6">
                <p id="lbl-total-income" class="text-emerald-400 text-sm">মোট আয়</p>
                <p id="total-income" class="text-4xl sm:text-5xl font-bold text-emerald-400 mt-2 currency">৳0</p>
            </div>
            <div class="glass rounded-3xl p-6">
                <p id="lbl-total-expense" class="text-rose-400 text-sm">মোট খরচ</p>
                <p id="total-expense" class="text-4xl sm:text-5xl font-bold text-rose-400 mt-2 currency">৳0</p>
            </div>
            <div class="glass rounded-3xl p-6">
                <p id="lbl-current-balance" class="text-cyan-400 text-sm">ব্যালেন্স</p>
                <p id="current-balance" class="text-4xl sm:text-5xl font-bold text-cyan-400 mt-2 currency">৳0</p>
            </div>
        </div>

        <!-- Add Transaction -->
        <div class="lg:grid lg:grid-cols-12 gap-8">
            <div class="lg:col-span-5 glass rounded-3xl p-6 sm:p-8 mb-8 lg:mb-0">
                <h3 id="lbl-new-tx" class="text-xl sm:text-2xl font-semibold mb-6">নতুন লেনদেন</h3>
                <form id="transaction-form" onsubmit="addTransaction(event)">
                    <div class="space-y-6">
                        <div>
                            <label id="lbl-type" class="block text-sm mb-2">ধরন</label>
                            <div class="flex bg-white/10 rounded-3xl p-1">
                                <button type="button" id="btn-income" onclick="setType('income')" class="flex-1 py-3.5 rounded-3xl font-medium text-sm">আয়</button>
                                <button type="button" id="btn-expense" onclick="setType('expense')" class="flex-1 py-3.5 rounded-3xl font-medium text-sm">খরচ</button>
                            </div>
                        </div>

                        <div>
                            <label id="lbl-amount" class="block text-sm mb-2">পরিমাণ (৳)</label>
                            <div class="relative">
                                <span class="absolute left-6 top-1/2 -translate-y-1/2 text-3xl text-cyan-400">৳</span>
                                <input id="amount" type="number" step="0.01" placeholder="0.00" 
                                       class="w-full glass rounded-3xl pl-14 pr-6 py-5 text-3xl font-mono" required>
                            </div>
                        </div>

                        <div>
                            <label id="lbl-category" class="block text-sm mb-2">বিভাগ</label>
                            <select id="category" class="w-full glass rounded-3xl px-6 py-5"></select>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label id="lbl-date" class="block text-sm mb-2">তারিখ</label>
                                <input id="date" type="date" class="w-full glass rounded-3xl px-6 py-5">
                            </div>
                            <div>
                                <label id="lbl-note" class="block text-sm mb-2">নোট</label>
                                <input id="note" type="text" placeholder="নোট লিখুন" 
                                       class="w-full glass rounded-3xl px-6 py-5">
                            </div>
                        </div>
                    </div>

                    <button type="submit" id="btn-submit" class="mt-10 w-full bg-gradient-to-r from-cyan-400 to-purple-500 text-black font-bold py-5 rounded-3xl text-lg">
                        লেনদেন যোগ করুন
                    </button>
                </form>
            </div>

            <!-- Transactions -->
            <div class="lg:col-span-7">
                <div id="transactions-container" class="space-y-6"></div>
            </div>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-xl z-[9999] items-center justify-center">
        <div class="glass max-w-sm w-full mx-4 rounded-3xl p-7 modal">
            <h3 id="lbl-profile-title" class="text-xl font-semibold mb-6">আপনার নাম</h3>
            <input id="profile-name-input" type="text" placeholder="আপনার নাম লিখুন" class="w-full glass rounded-3xl px-6 py-4 mb-6 outline-none focus:border-cyan-400">
            <div class="flex gap-3">
                <button id="btn-profile-cancel" onclick="closeProfileModal()" class="flex-1 py-3 border border-white/30 rounded-3xl hover:bg-white/10">বাতিল</button>
                <button id="btn-profile-save" onclick="saveProfileName()" class="flex-1 py-3 bg-cyan-400 text-black font-semibold rounded-3xl hover:bg-cyan-300">সংরক্ষণ</button>
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="detail-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-xl z-[9999] items-center justify-center">
        <div class="glass max-w-md w-full mx-4 rounded-3xl p-7 modal">
            <div class="flex justify-between mb-6">
                <h3 id="lbl-detail-title" class="text-xl font-semibold">বিস্তারিত</h3>
                <button onclick="closeDetailModal()" class="text-3xl text-slate-400 hover:text-white">×</button>
            </div>
            <div id="modal-content" class="space-y-6"></div>

            <div class="flex gap-3 mt-10">
                <button id="btn-delete" onclick="deleteCurrentTransaction()" class="flex-1 py-4 bg-rose-500/20 hover:bg-rose-500/30 text-rose-400 rounded-3xl font-medium">ডিলিট</button>
                <button id="btn-edit-open" onclick="openEditModal()" class="flex-1 py-4 bg-cyan-400 text-black rounded-3xl font-semibold">এডিট</button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-xl z-[9999] items-center justify-center">
        <div class="glass max-w-lg w-full mx-4 rounded-3xl p-8 modal">
            <h3 id="lbl-edit-title" class="text-2xl font-semibold mb-6">লেনদেন এডিট করুন</h3>

            <div class="space-y-6">
                <div>
                    <label id="lbl-edit-type" class="block text-sm mb-3">ধরন</label>
                    <div class="flex bg-white/10 rounded-3xl p-1">
                        <button id="edit-btn-income" onclick="setEditType('income')" class="flex-1 py-3.5 rounded-3xl font-medium">আয়</button>
                        <button id="edit-btn-expense" onclick="setEditType('expense')" class="flex-1 py-3.5 rounded-3xl font-medium">খরচ</button>
                    </div>
                </div>

                <div>
                    <label id="lbl-edit-amount" class="block text-sm mb-2">পরিমাণ (৳)</label>
                    <div class="relative">
                        <span class="absolute left-6 top-1/2 -translate-y-1/2 text-3xl text-cyan-400">৳</span>
                        <input id="edit-amount" type="number" step="0.01" 
                               class="w-full glass rounded-3xl pl-14 pr-6 py-5 text-4xl font-mono">
                    </div>
                </div>

                <div>
                    <label id="lbl-edit-category" class="block text-sm mb-2">বিভাগ</label>
                    <select id="edit-category" class="w-full glass rounded-3xl px-6 py-5"></select>
                </div>

                <div>
                    <label id="lbl-edit-date" class="block text-sm mb-2">তারিখ</label>
                    <input id="edit-date" type="date" class="w-full glass rounded-3xl px-6 py-5">
                </div>

                <div>
                    <label id="lbl-edit-note" class="block text-sm mb-2">নোট</label>
                    <textarea id="edit-note" rows="4" class="w-full glass rounded-3xl px-6 py-5 resize-none"></textarea>
                </div>
            </div>

            <div class="flex gap-3 mt-10">
                <button id="btn-cancel" onclick="closeEditModal()" class="flex-1 py-4 border border-white/30 rounded-3xl hover:bg-white/10">বাতিল</button>
                <button id="btn-save" onclick="saveEditedTransaction()" class="flex-1 py-4 bg-gradient-to-r from-emerald-400 to-cyan-400 text-black font-semibold rounded-3xl">সংরক্ষণ করুন</button>
            </div>
        </div>
    </div>

    <script>
        let transactions = [];
        let currentTransaction = null;
        let currentEditingId = null;
        let currentType = 'expense';
        let currentLang = localStorage.getItem('lang') || 'bn';
        let currentTheme = localStorage.getItem('theme') || 'dark';
        const currency = '৳';

        // --- Translations ---
        const i18n = {
            bn: {
                pageTitle: " Expense Tracker By Abdur Rahim| খরচ ট্র্যাকার বাই আব্দুর রাহিম",
                totalIncome: "মোট আয়",
                totalExpense: "মোট খরচ",
                currentBalance: "ব্যালেন্স",
                newTx: "নতুন লেনদেন",
                type: "ধরন",
                income: "আয়",
                expense: "খরচ",
                amount: "পরিমাণ (৳)",
                category: "বিভাগ",
                date: "তারিখ",
                note: "নোট",
                addBtn: "লেনদেন যোগ করুন",
                notePlaceholder: "নোট লিখুন",
                detailTitle: "বিস্তারিত",
                delete: "ডিলিট",
                edit: "এডিট",
                editTitle: "লেনদেন এডিট করুন",
                cancel: "বাতিল",
                save: "সংরক্ষণ",
                noNote: "নোট নেই",
                noTx: "কোনো লেনদেন নেই। উপরে যোগ করুন।",
                toastAdded: "লেনদেন যোগ হয়েছে",
                toastUpdated: "লেনদেন আপডেট হয়েছে ✓",
                toastDeleted: "লেনদেন মুছে ফেলা হয়েছে",
                confirmDelete: "এই লেনদেনটি স্থায়ীভাবে মুছে ফেলবেন?",
                pdfGenerating: "PDF রিপোর্ট তৈরি হচ্ছে...",
                defaultUser: "ব্যবহারকারী",
                profileTitle: "আপনার নাম",
                profilePlaceholder: "আপনার নাম লিখুন",
                toastNameSaved: "নাম সেভ হয়েছে ✓"
            },
            en: {
                pageTitle: " Expense Tracker By Abdur Rahim",
                totalIncome: "Total Income",
                totalExpense: "Total Expense",
                currentBalance: "Balance",
                newTx: "New Transaction",
                type: "Type",
                income: "Income",
                expense: "Expense",
                amount: "Amount (৳)",
                category: "Category",
                date: "Date",
                note: "Note",
                addBtn: "Add Transaction",
                notePlaceholder: "Write a note",
                detailTitle: "Details",
                delete: "Delete",
                edit: "Edit",
                editTitle: "Edit Transaction",
                cancel: "Cancel",
                save: "Save",
                noNote: "No note",
                noTx: "No transactions found. Add above.",
                toastAdded: "Transaction Added",
                toastUpdated: "Transaction Updated ✓",
                toastDeleted: "Transaction Deleted",
                confirmDelete: "Are you sure you want to delete this?",
                pdfGenerating: "Generating PDF Report...",
                defaultUser: "User",
                profileTitle: "Your Name",
                profilePlaceholder: "Enter your name",
                toastNameSaved: "Name Saved ✓"
            }
        };

        const catsMap = {
            income: [
                { bn: "বেতন", en: "Salary" },
                { bn: "ফ্রিল্যান্স", en: "Freelance" },
                { bn: "বিনিয়োগ", en: "Investment" },
                { bn: "বোনাস", en: "Bonus" },
                { bn: "অন্যান্য", en: "Others" }
            ],
            expense: [
                { bn: "বাজার", en: "Groceries" },
                { bn: "যাতায়াত", en: "Transport" },
                { bn: "বাসা ভাড়া", en: "Rent" },
                { bn: "বিল", en: "Bills" },
                { bn: "শপিং", en: "Shopping" },
                { bn: "বিনোদন", en: "Entertainment" },
                { bn: "স্বাস্থ্য", en: "Health" },
                { bn: "ভ্রমণ", en: "Travel" },
                { bn: "শিক্ষা", en: "Education" },
                { bn: "অন্যান্য", en: "Others" }
            ]
        };

        // --- Profile Functions ---
        function openProfileModal() {
            const savedName = localStorage.getItem('userName') || '';
            document.getElementById('profile-name-input').value = savedName;
            const modal = document.getElementById('profile-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeProfileModal() {
            const modal = document.getElementById('profile-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function saveProfileName() {
            const nameInput = document.getElementById('profile-name-input').value.trim();
            if (nameInput) {
                localStorage.setItem('userName', nameInput);
            } else {
                localStorage.removeItem('userName');
            }
            closeProfileModal();
            updateUILanguage(); // Refresh greeting
            showToast(i18n[currentLang].toastNameSaved);
        }

        // --- Dynamic Time Based Greeting (Bangladesh Time) ---
        function getDynamicGreeting() {
            let name = localStorage.getItem('userName');
            if (!name) {
                name = i18n[currentLang].defaultUser;
            }

            const d = new Date();
            const utc = d.getTime() + (d.getTimezoneOffset() * 60000);
            const bdTime = new Date(utc + (3600000 * 6));
            const hour = bdTime.getHours();

            let bnG, enG;
            if (hour >= 6 && hour < 12) {
                bnG = "শুভ সকাল"; enG = "Good Morning";
            } else if (hour >= 12 && hour < 15) {
                bnG = "শুভ দুপুর"; enG = "Good Noon";
            } else if (hour >= 15 && hour < 18) {
                bnG = "শুভ বিকেল"; enG = "Good Afternoon";
            } else if (hour >= 18 && hour < 20) {
                bnG = "শুভ সন্ধ্যা"; enG = "Good Evening";
            } else {
                bnG = "শুভ রাত্রি"; enG = "Good Night";
            }

            return currentLang === 'bn' ? `${bnG}, ${name}` : `${enG}, ${name}`;
        }

        function getCatDisplay(catName) {
            let found = catsMap.income.find(c => c.bn === catName || c.en === catName);
            if (!found) found = catsMap.expense.find(c => c.bn === catName || c.en === catName);
            return found ? found[currentLang] : catName;
        }

        function updateUILanguage() {
            const texts = i18n[currentLang];
            document.getElementById("page-title").textContent = texts.pageTitle;
            document.getElementById("greeting").textContent = getDynamicGreeting(); 
            
            document.getElementById("lbl-profile-title").textContent = texts.profileTitle;
            document.getElementById("profile-name-input").placeholder = texts.profilePlaceholder;
            document.getElementById("btn-profile-cancel").textContent = texts.cancel;
            document.getElementById("btn-profile-save").textContent = texts.save;

            document.getElementById("lbl-total-income").textContent = texts.totalIncome;
            document.getElementById("lbl-total-expense").textContent = texts.totalExpense;
            document.getElementById("lbl-current-balance").textContent = texts.currentBalance;
            document.getElementById("lbl-new-tx").textContent = texts.newTx;
            document.getElementById("lbl-type").textContent = texts.type;
            document.getElementById("btn-income").textContent = texts.income;
            document.getElementById("btn-expense").textContent = texts.expense;
            document.getElementById("lbl-amount").textContent = texts.amount;
            document.getElementById("lbl-category").textContent = texts.category;
            document.getElementById("lbl-date").textContent = texts.date;
            document.getElementById("lbl-note").textContent = texts.note;
            document.getElementById("note").placeholder = texts.notePlaceholder;
            document.getElementById("btn-submit").textContent = texts.addBtn;
            
            document.getElementById("lbl-detail-title").textContent = texts.detailTitle;
            document.getElementById("btn-delete").textContent = texts.delete;
            document.getElementById("btn-edit-open").textContent = texts.edit;
            document.getElementById("lbl-edit-title").textContent = texts.editTitle;
            document.getElementById("lbl-edit-type").textContent = texts.type;
            document.getElementById("edit-btn-income").textContent = texts.income;
            document.getElementById("edit-btn-expense").textContent = texts.expense;
            document.getElementById("lbl-edit-amount").textContent = texts.amount;
            document.getElementById("lbl-edit-category").textContent = texts.category;
            document.getElementById("lbl-edit-date").textContent = texts.date;
            document.getElementById("lbl-edit-note").textContent = texts.note;
            document.getElementById("btn-cancel").textContent = texts.cancel;
            document.getElementById("btn-save").textContent = texts.save;

            document.getElementById("lang-btn").textContent = currentLang === 'bn' ? 'EN' : 'বাংলা';
            
            setType(currentType); 
            renderGroupedTransactions(); 
        }

        function toggleLanguage() {
            currentLang = currentLang === 'bn' ? 'en' : 'bn';
            localStorage.setItem('lang', currentLang);
            updateUILanguage();
        }

        // --- Core Functions ---
        function loadData() {
            const saved = localStorage.getItem("transactions");
            if (saved) transactions = JSON.parse(saved);
        }

        function saveData() {
            localStorage.setItem("transactions", JSON.stringify(transactions));
        }

        function calculateTotals() {
            let income = 0, expense = 0;
            transactions.forEach(t => {
                const amt = parseFloat(t.amount);
                if (t.type === 'income') income += amt;
                else expense += amt;
            });
            const balance = income - expense;

            document.getElementById("total-income").textContent = currency + income.toLocaleString('en-IN');
            document.getElementById("total-expense").textContent = currency + expense.toLocaleString('en-IN');
            document.getElementById("current-balance").textContent = currency + Math.abs(balance).toLocaleString('en-IN');
        }

        // --- Updated Collapsible Transactions ---
        function renderGroupedTransactions() {
            const container = document.getElementById("transactions-container");
            container.innerHTML = "";
            const texts = i18n[currentLang];
            const locale = currentLang === 'bn' ? 'bn-BD' : 'en-US';

            const grouped = {};
            transactions.forEach(tx => {
                if (!grouped[tx.date]) grouped[tx.date] = [];
                grouped[tx.date].push(tx);
            });

            const sortedDates = Object.keys(grouped).sort((a, b) => new Date(b) - new Date(a));

            sortedDates.forEach(date => {
                const dayTx = grouped[date];
                let dayIncome = 0, dayExpense = 0;
                dayTx.forEach(tx => {
                    if (tx.type === 'income') dayIncome += parseFloat(tx.amount);
                    else dayExpense += parseFloat(tx.amount);
                });

                const groupDiv = document.createElement("div");
                groupDiv.className = "mb-4";

                // Header (Clickable)
                const headerDiv = document.createElement("div");
                headerDiv.className = "flex justify-between items-center glass bg-slate-800/60 dark:bg-slate-800/60 px-5 py-4 rounded-3xl cursor-pointer hover:bg-white/5 transition-colors";
                
                headerDiv.innerHTML = `
                    <div class="flex items-center gap-2">
                        <span class="toggle-icon inline-block transition-transform duration-300 -rotate-90 text-[10px] text-slate-400">▼</span>
                        <p class="font-medium text-sm sm:text-base">${new Date(date).toLocaleDateString(locale, {weekday:'long', day:'numeric', month:'long', year:'numeric'})}</p>
                    </div>
                    <div class="text-xs sm:text-sm text-right">
                        <span class="text-emerald-400 font-mono">+${dayIncome}</span>
                        <span class="text-rose-400 mx-1 font-mono">-${dayExpense}</span>
                    </div>
                `;

                // Transaction List (Hidden by default)
                const txList = document.createElement("div");
                txList.className = "space-y-3 mt-3 hidden"; 

                // Toggle Functionality
                headerDiv.onclick = () => {
                    txList.classList.toggle("hidden");
                    const icon = headerDiv.querySelector('.toggle-icon');
                    icon.classList.toggle("-rotate-90"); 
                };

                dayTx.forEach(tx => {
                    const isIncome = tx.type === 'income';
                    const card = document.createElement("div");
                    card.className = `transaction-card glass rounded-3xl p-5 sm:p-6 flex justify-between items-center cursor-pointer border-l-4 ${isIncome ? 'border-emerald-400' : 'border-rose-400'} hover:bg-white/5`;
                    card.onclick = () => showDetail(tx);
                    card.innerHTML = `
                        <div class="flex-1 min-w-0">
                            <p class="font-medium truncate">${getCatDisplay(tx.category)}</p>
                            <p class="text-xs text-slate-400 mt-1 truncate">${tx.note || texts.noNote}</p>
                        </div>
                        <div class="text-right ml-4">
                            <p class="text-xl sm:text-2xl font-mono ${isIncome ? 'text-emerald-400' : 'text-rose-400'}">
                                ${isIncome ? '+' : '-'}${currency}${parseFloat(tx.amount).toLocaleString('en-IN')}
                            </p>
                        </div>
                    `;
                    txList.appendChild(card);
                });

                groupDiv.appendChild(headerDiv);
                groupDiv.appendChild(txList);
                container.appendChild(groupDiv);
            });

            if (sortedDates.length === 0) {
                container.innerHTML = `<p class="text-center py-16 text-slate-400">${texts.noTx}</p>`;
            }
        }

        function showDetail(tx) {
            currentTransaction = tx;
            const modal = document.getElementById("detail-modal");
            const content = document.getElementById("modal-content");
            const isIncome = tx.type === 'income';
            const texts = i18n[currentLang];
            const locale = currentLang === 'bn' ? 'bn-BD' : 'en-US';

            content.innerHTML = `
                <div class="space-y-6 text-sm">
                    <div class="flex justify-between"><span class="text-slate-400">${texts.type}</span><span class="${isIncome?'text-emerald-400':'text-rose-400'}">${isIncome?texts.income:texts.expense}</span></div>
                    <div class="flex justify-between"><span class="text-slate-400">${texts.date}</span><span>${new Date(tx.date).toLocaleDateString(locale, {weekday:'long', day:'numeric', month:'long', year:'numeric'})}</span></div>
                    <div class="flex justify-between"><span class="text-slate-400">${texts.category}</span><span>${getCatDisplay(tx.category)}</span></div>
                    <div class="flex justify-between"><span class="text-slate-400">${texts.amount}</span><span class="text-3xl font-mono ${isIncome?'text-emerald-400':'text-rose-400'}">${isIncome?'+':'-'}${currency}${parseFloat(tx.amount).toLocaleString('en-IN')}</span></div>
                    <div><span class="text-slate-400 block mb-2">${texts.note}</span><p class="bg-slate-900/50 p-5 rounded-2xl">${tx.note || texts.noNote}</p></div>
                </div>
            `;
            modal.classList.remove("hidden");
            modal.classList.add("flex");
        }

        function closeDetailModal() {
            const modal = document.getElementById("detail-modal");
            modal.classList.add("hidden");
            modal.classList.remove("flex");
        }

        function openEditModal() {
            closeDetailModal();
            if (!currentTransaction) return;

            currentEditingId = currentTransaction.id;
            const editModal = document.getElementById("edit-modal");

            setEditType(currentTransaction.type);
            document.getElementById("edit-amount").value = currentTransaction.amount;
            document.getElementById("edit-date").value = currentTransaction.date;
            document.getElementById("edit-note").value = currentTransaction.note || "";

            updateEditCategorySelect(currentTransaction.type);

            editModal.classList.remove("hidden");
            editModal.classList.add("flex");
        }

        function setEditType(type) {
            document.getElementById("edit-btn-income").classList.toggle("bg-emerald-500", type === "income");
            document.getElementById("edit-btn-expense").classList.toggle("bg-rose-500", type === "expense");
            updateEditCategorySelect(type);
        }

        function updateEditCategorySelect(type) {
            const select = document.getElementById("edit-category");
            select.innerHTML = "";
            const cats = catsMap[type];
            cats.forEach(cat => {
                const opt = document.createElement("option");
                opt.value = cat.bn; // Keep value original for internal use
                opt.textContent = cat[currentLang];
                if (cat.bn === currentTransaction.category) opt.selected = true;
                select.appendChild(opt);
            });
        }

        function closeEditModal() {
            const modal = document.getElementById("edit-modal");
            modal.classList.add("hidden");
            modal.classList.remove("flex");
        }

        function saveEditedTransaction() {
            if (!currentEditingId) return;

            const tx = transactions.find(t => t.id === currentEditingId);
            if (!tx) return;

            tx.type = document.getElementById("edit-btn-income").classList.contains("bg-emerald-500") ? "income" : "expense";
            tx.amount = parseFloat(document.getElementById("edit-amount").value);
            tx.category = document.getElementById("edit-category").value;
            tx.date = document.getElementById("edit-date").value;
            tx.note = document.getElementById("edit-note").value.trim();

            saveData();
            calculateTotals();
            renderGroupedTransactions();
            closeEditModal();
            showToast(i18n[currentLang].toastUpdated);
        }

        function deleteCurrentTransaction() {
            if (!currentTransaction) return;
            if (confirm(i18n[currentLang].confirmDelete)) {
                transactions = transactions.filter(t => t.id !== currentTransaction.id);
                saveData();
                calculateTotals();
                renderGroupedTransactions();
                closeDetailModal();
                showToast(i18n[currentLang].toastDeleted);
            }
        }

        function addTransaction(e) {
            e.preventDefault();
            const amount = parseFloat(document.getElementById("amount").value);
            if (!amount) return;

            const newTx = {
                id: Date.now(),
                type: currentType,
                amount: amount,
                category: document.getElementById("category").value,
                date: document.getElementById("date").value || new Date().toISOString().split('T')[0],
                note: document.getElementById("note").value.trim()
            };

            transactions.unshift(newTx);
            saveData();
            calculateTotals();
            renderGroupedTransactions();

            e.target.reset();
            showToast(i18n[currentLang].toastAdded);
        }

        function setType(type) {
            currentType = type;
            document.getElementById("btn-income").classList.toggle("bg-emerald-500", type === "income");
            document.getElementById("btn-expense").classList.toggle("bg-rose-500", type === "expense");

            const select = document.getElementById("category");
            select.innerHTML = "";
            const cats = catsMap[type];
            cats.forEach(cat => {
                const opt = document.createElement("option");
                opt.value = cat.bn; // Store as BN internally
                opt.textContent = cat[currentLang];
                select.appendChild(opt);
            });
        }

        function showToast(msg) {
            const toast = document.createElement("div");
            toast.className = "fixed bottom-6 left-1/2 -translate-x-1/2 glass px-8 py-3.5 rounded-3xl text-sm shadow-2xl z-[999] bg-slate-900 text-white";
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', currentTheme);
            document.documentElement.classList.toggle('dark', currentTheme === 'dark');
            document.documentElement.classList.toggle('light', currentTheme === 'light');
            document.getElementById("theme-btn").textContent = currentTheme === 'dark' ? '☀️' : '🌙';
        }

        // --- PDF Export Feature ---
        function exportToPDF() {
            if(transactions.length === 0) {
                showToast(currentLang === 'bn' ? "কোনো লেনদেন নেই" : "No transactions to export");
                return;
            }
            
            showToast(i18n[currentLang].pdfGenerating);
            const texts = i18n[currentLang];
            const locale = currentLang === 'bn' ? 'bn-BD' : 'en-US';

            let income = 0, expense = 0;
            transactions.forEach(t => {
                if (t.type === 'income') income += parseFloat(t.amount);
                else expense += parseFloat(t.amount);
            });
            const balance = income - expense;

            let tableRows = '';
            const sortedTx = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));
            
            sortedTx.forEach(tx => {
                const isIncome = tx.type === 'income';
                tableRows += `
                    <tr>
                        <td style="padding: 10px; border-bottom: 1px solid #ddd;">${new Date(tx.date).toLocaleDateString(locale)}</td>
                        <td style="padding: 10px; border-bottom: 1px solid #ddd;">${getCatDisplay(tx.category)}</td>
                        <td style="padding: 10px; border-bottom: 1px solid #ddd;">${tx.note || '-'}</td>
                        <td style="padding: 10px; border-bottom: 1px solid #ddd; text-align: right; color: ${isIncome ? 'green' : 'red'};">
                            ${isIncome ? '+' : '-'}${currency}${parseFloat(tx.amount).toLocaleString('en-IN')}
                        </td>
                    </tr>
                `;
            });

            const pdfContainer = document.createElement('div');
            pdfContainer.innerHTML = `
                <div style="padding: 40px; font-family: sans-serif; color: #111; background: #fff;">
                    <h1 style="text-align: center; color: #0284c7; margin-bottom: 5px;">AI Expense Tracker</h1>
                    <h3 style="text-align: center; color: #666; margin-top: 0; margin-bottom: 30px;">Transaction Report</h3>
                    
                    <div style="display: flex; justify-content: space-between; margin-bottom: 30px; background: #f8fafc; padding: 20px; border-radius: 10px;">
                        <div>
                            <p style="margin: 0; font-size: 14px; color: #666;">${texts.totalIncome}</p>
                            <p style="margin: 5px 0 0; font-size: 24px; color: #16a34a; font-weight: bold;">${currency}${income.toLocaleString('en-IN')}</p>
                        </div>
                        <div>
                            <p style="margin: 0; font-size: 14px; color: #666;">${texts.totalExpense}</p>
                            <p style="margin: 5px 0 0; font-size: 24px; color: #dc2626; font-weight: bold;">${currency}${expense.toLocaleString('en-IN')}</p>
                        </div>
                        <div>
                            <p style="margin: 0; font-size: 14px; color: #666;">${texts.currentBalance}</p>
                            <p style="margin: 5px 0 0; font-size: 24px; color: #0284c7; font-weight: bold;">${currency}${balance.toLocaleString('en-IN')}</p>
                        </div>
                    </div>

                    <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                        <thead>
                            <tr style="background: #f1f5f9; text-align: left;">
                                <th style="padding: 12px 10px;">${texts.date}</th>
                                <th style="padding: 12px 10px;">${texts.category}</th>
                                <th style="padding: 12px 10px;">${texts.note}</th>
                                <th style="padding: 12px 10px; text-align: right;">${texts.amount}</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tableRows}
                        </tbody>
                    </table>
                    <div style="margin-top: 40px; text-align: center; font-size: 12px; color: #999;">
                        Generated by AI Expense Tracker on ${new Date().toLocaleString(locale)}
                    </div>
                </div>
            `;

            const opt = {
                margin:       0,
                filename:     `Expense_Report_${new Date().toISOString().split('T')[0]}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(pdfContainer).save();
        }

        function init() {
            loadData();
            
            document.documentElement.classList.toggle('dark', currentTheme === 'dark');
            document.documentElement.classList.toggle('light', currentTheme === 'light');
            document.getElementById("theme-btn").textContent = currentTheme === 'dark' ? '☀️' : '🌙';
            
            updateUILanguage(); 
            calculateTotals();
        }

        window.onload = init;
    </script>
</body>
</html>
